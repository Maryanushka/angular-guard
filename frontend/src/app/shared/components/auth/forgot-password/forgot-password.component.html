<form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
	<div class="text-sm text-gray-600 mb-2">
		{{ 'AUTH.FORGOT_PASSWORD.INSTRUCTION' | translate }}
	</div>

	<div class="flex flex-col gap-1">
		<label for="reset-email" class="text-sm font-medium text-gray-700">{{ 'COMMON.LABELS.EMAIL' | translate }}</label>
		<input pInputText id="reset-email" formControlName="email" placeholder="email@example.com" class="w-full" />
	</div>

	<p-button type="submit" [label]="'AUTH.SEND_RESET_LINK' | translate" styleClass="w-full" [disabled]="forgotPasswordForm.invalid" />

	<div class="text-center mt-2">
		<p-button [label]="'AUTH.BACK_TO_LOGIN' | translate" [link]="true" (onClick)="goToLogin()" styleClass="p-0 text-sm font-medium" />
	</div>
</form>
